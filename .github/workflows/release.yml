name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive
        run: |
          xcodebuild \
            -scheme TabVault \
            -configuration Release \
            -archivePath $RUNNER_TEMP/TabVault.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TabVault.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        run: |
          mkdir -p $RUNNER_TEMP/dmg-staging
          cp -r "$RUNNER_TEMP/export/TabVault.app" $RUNNER_TEMP/dmg-staging/
          ln -s /Applications $RUNNER_TEMP/dmg-staging/Applications
          hdiutil create \
            -volname "TabVault" \
            -srcfolder $RUNNER_TEMP/dmg-staging \
            -ov -format UDZO \
            -o $RUNNER_TEMP/TabVault.dmg

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TabVault ${{ github.ref_name }}
          body: |
            ## Install
            1. Download `TabVault.dmg` below
            2. Open it and drag **TabVault.app** to your Applications folder
            3. On first launch, right-click the app → **Open** → **Open** to bypass the Gatekeeper warning (unsigned build)
          files: ${{ runner.temp }}/TabVault.dmg
